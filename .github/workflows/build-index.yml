name: Build media index

# Optimizes screenshots, prunes old PR folders, and regenerates index.json
# whenever images change under pr-*/. Commits the result back with [skip ci] so
# it never loops. Uses only this repo's own GITHUB_TOKEN — no secrets.

on:
  push:
    branches: [main]
    paths:
      - 'pr-*/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: media-index
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-save --no-audit --no-fund sharp
      - run: node scripts/optimize-and-index.mjs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
      - name: Commit optimized images + index
        run: |
          git config user.name "swingtribe-media[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: optimize + reindex [skip ci]"
            git push
          fi
